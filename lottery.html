<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新春開運抽獎系統 2077</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap');
        
        :root {
            --red: #991b1b;
            --gold: #fbbf24;
            --bg: #2d0606;
        }

        body {
            background-color: var(--bg);
            color: #fef3c7;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        /* 新年標題字體 */
        .font-festive {
            font-family: 'ZCOOL XiaoWei', serif;
        }

        /* 內部自定義捲軸樣式 (金黃色) */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(251, 191, 36, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(251, 191, 36, 0.3); 
            border-radius: 10px;
        }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb {
            background: var(--gold);
        }

        .gold-border-active {
            border-color: var(--gold);
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.3);
        }

        .tab-active {
            color: var(--gold);
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }

        .glass-panel {
            background: rgba(153, 27, 27, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(251, 191, 36, 0.15);
        }

        .chip-name {
            background: rgba(251, 191, 36, 0.08);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: #fde68a;
        }

        .chip-prize {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        /* 掃描線改為祥雲感或淡淡金光 */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(251, 191, 36, 0.08), transparent);
            animation: scanline 5s linear infinite;
        }

        /* 燈籠搖晃效果 */
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        .sway {
            animation: sway 3s ease-in-out infinite;
            transform-origin: top center;
        }
    </style>
</head>
<body class="flex flex-col h-screen">
    <!-- 粒子背景 (金粉) -->
    <canvas id="particleCanvas" class="fixed inset-0 pointer-events-none z-0"></canvas>

    <!-- 頂部導覽 -->
    <nav class="relative z-10 flex justify-center py-5 shrink-0 space-x-12">
        <button onclick="switchTab('draw')" id="btn-draw" class="relative group px-2 py-1 text-sm font-bold tracking-widest transition-all">
            <span class="flex items-center gap-2"><i data-lucide="sparkles" size="18"></i> 新春大抽獎</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-settings" class="relative group px-2 py-1 text-sm font-bold tracking-widest transition-all text-red-300/50">
            <span class="flex items-center gap-2"><i data-lucide="sliders" size="18"></i> 活動設定</span>
        </button>
        <button onclick="switchTab('history')" id="btn-history" class="relative group px-2 py-1 text-sm font-bold tracking-widest transition-all text-red-300/50">
            <span class="flex items-center gap-2"><i data-lucide="scroll" size="18"></i> 中獎榜單</span>
        </button>
    </nav>

    <!-- 訊息提示 (Toast) -->
    <div id="toast" class="fixed top-10 right-10 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl border backdrop-blur-xl hidden transform translate-x-full transition-transform duration-300">
        <i data-lucide="info" size="20"></i>
        <span id="toast-text" class="font-bold"></span>
    </div>

    <!-- 主要內容區 -->
    <main class="relative z-10 flex-grow w-full max-w-[1400px] mx-auto px-6 overflow-hidden">
        
        <!-- 抽獎會場 (三欄佈局) -->
        <section id="view-draw" class="h-full grid grid-cols-12 gap-6 py-4 overflow-hidden">
            
            <!-- 左欄：參與名單 -->
            <div class="col-span-3 flex flex-col h-full overflow-hidden">
                <div class="flex items-center justify-between mb-3 px-2">
                    <h3 class="text-xs font-black tracking-widest text-amber-500/70 flex items-center gap-2 uppercase">
                        <i data-lucide="users" size="14"></i> 嘉賓名單 (<span id="count-names">0</span>)
                    </h3>
                </div>
                <div id="live-names-list" class="flex-grow glass-panel rounded-2xl p-4 overflow-y-auto custom-scrollbar flex flex-wrap content-start gap-2">
                    <!-- 名單標籤將生成於此 -->
                </div>
            </div>

            <!-- 中欄：主抽獎區 -->
            <div class="col-span-6 flex flex-col items-center justify-between space-y-4 py-2">
                <!-- 中央大螢幕 (大紅燈籠背景感) -->
                <div id="display-screen" class="relative w-full flex-grow rounded-[3rem] border-2 border-amber-500/20 bg-red-900/10 transition-all duration-700 overflow-hidden flex flex-col items-center justify-center scanline">
                    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(251,191,36,0.1),transparent_75%)] pointer-events-none"></div>
                    <div id="current-name" class="text-6xl md:text-8xl lg:text-9xl font-black tracking-tighter text-center px-4 text-red-950 transition-colors uppercase leading-tight font-festive">恭喜發財</div>
                    <p id="system-status" class="text-amber-500/50 tracking-[0.5em] text-[10px] font-bold animate-pulse mt-8 uppercase">🧧 鴻運當頭 // 準備開獎 🧧</p>
                    
                    <!-- 裝飾元素 (傳統花紋) -->
                    <div class="absolute top-8 left-8 border-l-4 border-t-4 border-amber-600/30 w-12 h-12"></div>
                    <div class="absolute bottom-8 right-8 border-r-4 border-b-4 border-amber-600/30 w-12 h-12"></div>
                </div>

                <!-- 開始按鈕 (如大紅燈籠或印章) -->
                <button id="draw-button" onclick="startDraw()" class="group relative h-28 w-28 shrink-0 rounded-full transition-all duration-500 hover:scale-110 active:scale-95">
                    <div class="absolute inset-0 rounded-full bg-amber-500 animate-ping opacity-20"></div>
                    <div class="absolute -inset-4 bg-red-600/20 rounded-full blur-2xl"></div>
                    <div class="relative h-full w-full rounded-full bg-gradient-to-tr from-red-700 to-amber-500 flex items-center justify-center border-4 border-amber-200/50 shadow-[0_0_30px_rgba(185,28,28,0.5)]">
                        <i data-lucide="gift" class="text-white" size="40"></i>
                    </div>
                </button>
            </div>

            <!-- 右欄：獎項內容 -->
            <div class="col-span-3 flex flex-col h-full overflow-hidden">
                <div class="flex items-center justify-between mb-3 px-2">
                    <h3 class="text-xs font-black tracking-widest text-amber-500 flex items-center gap-2 uppercase">
                        <i data-lucide="trophy" size="14"></i> 豐富獎項 (<span id="count-prizes">0</span>)
                    </h3>
                </div>
                <div id="live-prizes-list" class="flex-grow glass-panel rounded-2xl p-4 overflow-y-auto custom-scrollbar space-y-2">
                    <!-- 獎項標籤將生成於此 -->
                </div>
            </div>

        </section>

        <!-- 設定頁面 -->
        <section id="view-settings" class="hidden h-full flex flex-col py-4">
            <div class="grid md:grid-cols-2 gap-8 h-full overflow-hidden pb-4">
                <div class="glass-panel p-6 rounded-[2rem] flex flex-col h-full overflow-hidden">
                    <div class="flex items-center justify-between mb-4 shrink-0">
                        <h3 class="text-lg font-bold flex items-center gap-3 text-amber-500">
                            <i data-lucide="users" size="20"></i> 名單管理
                        </h3>
                        <button onclick="restoreToDefault('names')" class="text-[10px] text-red-300/50 hover:text-amber-400 flex items-center gap-1 transition-colors uppercase font-black">
                            <i data-lucide="rotate-ccw" size="12"></i> 恢復範例
                        </button>
                    </div>
                    <textarea id="input-names" class="flex-grow w-full bg-black/30 border border-amber-500/10 rounded-2xl p-5 font-mono text-sm focus:border-amber-500 outline-none transition-all resize-none custom-scrollbar text-amber-100" placeholder="一行一個名字..."></textarea>
                </div>
                <div class="glass-panel p-6 rounded-[2rem] flex flex-col h-full overflow-hidden">
                    <div class="flex items-center justify-between mb-4 shrink-0">
                        <h3 class="text-lg font-bold flex items-center gap-3 text-amber-500">
                            <i data-lucide="gift" size="20"></i> 獎項管理
                        </h3>
                        <button onclick="restoreToDefault('prizes')" class="text-[10px] text-red-300/50 hover:text-amber-400 flex items-center gap-1 transition-colors uppercase font-black">
                            <i data-lucide="rotate-ccw" size="12"></i> 恢復範例
                        </button>
                    </div>
                    <textarea id="input-prizes" class="flex-grow w-full bg-black/30 border border-amber-500/10 rounded-2xl p-5 font-mono text-sm focus:border-amber-500 outline-none transition-all resize-none mb-6 custom-scrollbar text-amber-100" placeholder="一行一個獎項..."></textarea>
                    
                    <div class="grid grid-cols-2 gap-4 shrink-0">
                        <button onclick="resetCurrentProgress()" class="py-4 bg-red-900/40 hover:bg-red-900/60 text-amber-200 rounded-2xl font-black text-xs tracking-[0.1em] border border-amber-500/20 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="refresh-cw" size="14"></i> 重新開始 (恢復清單)
                        </button>
                        <button onclick="saveSettings()" class="py-4 bg-gradient-to-r from-red-700 to-amber-600 rounded-2xl font-black text-xs tracking-[0.2em] hover:shadow-[0_0_30px_rgba(185,28,28,0.4)] transition-all flex items-center justify-center gap-2 text-white">
                            <i data-lucide="save" size="14"></i> 儲存數據並建立備份
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 紀錄頁面 -->
        <section id="view-history" class="hidden h-full flex flex-col py-4 max-w-3xl mx-auto w-full">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h2 class="text-2xl font-black tracking-tighter italic uppercase font-festive text-amber-500">🧧 中獎功德榜 🧧</h2>
                <button onclick="clearHistory()" class="p-2 text-red-300/50 hover:text-white transition-colors">
                    <i data-lucide="trash-2" size="20"></i>
                </button>
            </div>
            <div id="history-list" class="flex-grow space-y-3 overflow-y-auto pr-4 custom-scrollbar pb-10">
                <!-- 紀錄列表 -->
            </div>
        </section>

    </main>

    <!-- 頁尾 -->
    <footer class="relative z-10 py-4 text-center text-[9px] font-bold text-red-900/50 tracking-[0.8em] uppercase shrink-0">
        Lunar New Year Lottery // Year of the Dragon // v1.6.NewYear
    </footer>

    <!-- 中獎彈窗 (喜氣升級) -->
    <div id="winner-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-red-950/95 backdrop-blur-xl"></div>
        <div class="relative w-full max-w-xl bg-gradient-to-b from-red-800 to-red-950 border-2 border-amber-500/50 rounded-[3rem] p-10 text-center shadow-[0_0_100px_rgba(185,28,28,0.5)] scale-90 opacity-0 transition-all duration-300" id="winner-modal-content">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-amber-500/50 hover:text-amber-500">
                <i data-lucide="x" size="28"></i>
            </button>
            <div class="mb-6">
                <div class="inline-block p-4 rounded-full bg-amber-500/10 text-amber-500 mb-4 border border-amber-500/20">
                    <i data-lucide="party-popper" size="40"></i>
                </div>
                <h4 class="text-amber-400 font-black tracking-[0.4em] text-xs mb-2 uppercase font-festive">大吉大利 財源廣進</h4>
                <h2 id="winner-name" class="text-6xl md:text-7xl font-black text-white tracking-tighter mb-4 font-festive"></h2>
            </div>
            <div class="relative inline-block px-10 py-5">
                <div class="absolute inset-0 bg-amber-500 skew-x-[-12deg] shadow-[0_0_40px_rgba(251,191,36,0.5)]"></div>
                <span id="winner-prize" class="relative z-10 text-red-900 text-2xl font-black italic uppercase"></span>
            </div>
            <div class="mt-10">
                <button onclick="closeModal()" class="text-amber-500/50 hover:text-amber-400 text-[10px] font-bold tracking-widest uppercase transition-colors">確認領獎 (恭喜！)</button>
            </div>
        </div>
    </div>

    <script>
        // --- 預設資料 (春節版) ---
        const DEFAULT_NAMES = ['陳大春', '李美花', '王好運', '趙大吉', '孫發財', '周利市', '蔡招財', '林平安', '郭長壽', '張團圓'];
        const DEFAULT_PRIZES = ['開運紅包 8888', '黃金萬兩金條', '五星級飯店雙人餐券', '高級氣泡水機', '限量紀念版公仔', '安慰獎刮刮樂'];

        // --- 狀態初始化 ---
        let names = JSON.parse(localStorage.getItem('lottery_names')) || [...DEFAULT_NAMES];
        let prizes = JSON.parse(localStorage.getItem('lottery_prizes')) || [...DEFAULT_PRIZES];
        let originalNames = JSON.parse(localStorage.getItem('lottery_names_original')) || [...names];
        let originalPrizes = JSON.parse(localStorage.getItem('lottery_prizes_original')) || [...prizes];
        
        let history = JSON.parse(localStorage.getItem('lottery_history')) || [];
        let isDrawing = false;

        // --- 音效管理器 (微調頻率更具清脆感) ---
        const SoundManager = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playTick() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, this.ctx.currentTime); // 更清脆的滴答聲
                osc.frequency.exponentialRampToValueAtTime(300, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            },
            playWin() {
                this.init();
                // 使用更開心的音階
                [659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime + i * 0.1);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.1 + 0.6);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(this.ctx.currentTime + i * 0.1); osc.stop(this.ctx.currentTime + i * 0.1 + 0.6);
                });
            }
        };

        // --- 粒子系統 (金粉特效) ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * (isDrawing ? 12 : 0.8);
                this.speedY = (Math.random() - 0.5) * (isDrawing ? 12 : 0.8);
                // 金色、紅包紅、雪白色的粒子
                const colors = ['#fbbf24', '#f59e0b', '#ef4444', '#ffffff'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = isDrawing ? 0.8 : 0.2;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        function initParticles() { for (let i = 0; i < 70; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // --- 核心顯示與邏輯 ---
        function renderLivePools() {
            const nameList = document.getElementById('live-names-list');
            const prizeList = document.getElementById('live-prizes-list');
            
            nameList.innerHTML = names.map(n => `
                <div class="chip-name text-[10px] font-bold px-3 py-1 rounded-md animate-in fade-in zoom-in duration-300">
                    ${n}
                </div>
            `).join('');

            prizeList.innerHTML = prizes.map(p => `
                <div class="chip-prize text-xs font-bold px-4 py-2 rounded-xl flex items-center gap-2 animate-in slide-in-from-right duration-300">
                    <i data-lucide="sparkles" size="10" class="shrink-0 text-amber-500"></i> ${p}
                </div>
            `).join('');
            
            lucide.createIcons();
            updateCounts();
        }

        function updateCounts() {
            document.getElementById('count-names').innerText = names.length;
            document.getElementById('count-prizes').innerText = prizes.length;
        }

        function switchTab(tabId) {
            ['draw', 'settings', 'history'].forEach(id => {
                document.getElementById(`view-${id}`).classList.add('hidden');
                document.getElementById(`btn-${id}`).classList.remove('tab-active');
                document.getElementById(`btn-${id}`).classList.add('text-red-300/50');
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`btn-${tabId}`).classList.add('tab-active');
            document.getElementById(`btn-${tabId}`).classList.remove('text-red-300/50');
            if (tabId === 'history') renderHistory();
            if (tabId === 'draw') renderLivePools();
            if (tabId === 'settings') {
                document.getElementById('input-names').value = names.join('\n');
                document.getElementById('input-prizes').value = prizes.join('\n');
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toast-text');
            text.innerText = msg;
            toast.className = `fixed top-10 right-10 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl border backdrop-blur-xl transform transition-transform duration-300 ${type === 'error' ? 'bg-red-500/20 border-red-500/50 text-red-100' : 'bg-amber-500/20 border-amber-500/50 text-amber-100'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }

        function restoreToDefault(target) {
            if (target === 'names') { document.getElementById('input-names').value = DEFAULT_NAMES.join('\n'); }
            else { document.getElementById('input-prizes').value = DEFAULT_PRIZES.join('\n'); }
            showToast('已填入新春範例內容');
        }

        function resetCurrentProgress() {
            if (confirm('確定要「重新開始」嗎？這會恢復您上次儲存的完整清單。')) {
                names = [...originalNames]; prizes = [...originalPrizes];
                localStorage.setItem('lottery_names', JSON.stringify(names));
                localStorage.setItem('lottery_prizes', JSON.stringify(prizes));
                renderLivePools();
                showToast('已恢復原始開獎狀態');
            }
        }

        function saveSettings() {
            const n = document.getElementById('input-names').value.split('\n').filter(x => x.trim());
            const p = document.getElementById('input-prizes').value.split('\n').filter(x => x.trim());
            if (n.length === 0 || p.length === 0) return showToast('名單或獎項不得為空', 'error');
            names = [...n]; prizes = [...p];
            originalNames = [...n]; originalPrizes = [...p];
            localStorage.setItem('lottery_names', JSON.stringify(names));
            localStorage.setItem('lottery_prizes', JSON.stringify(prizes));
            localStorage.setItem('lottery_names_original', JSON.stringify(originalNames));
            localStorage.setItem('lottery_prizes_original', JSON.stringify(originalPrizes));
            showToast('新春大數據已部署完畢！');
            renderLivePools(); switchTab('draw');
        }

        function startDraw() {
            if (names.length === 0 || prizes.length === 0 || isDrawing) {
                if (names.length === 0) showToast('參加者已抽完，請至設定重新開始！', 'error');
                else if (prizes.length === 0) showToast('獎品已發送完畢！', 'error');
                return;
            }
            isDrawing = true; SoundManager.init();
            particles.forEach(p => p.reset());
            const targetName = names[Math.floor(Math.random() * names.length)];
            const targetPrize = prizes[Math.floor(Math.random() * prizes.length)];
            const nameEl = document.getElementById('current-name');
            const statusEl = document.getElementById('system-status');
            const screen = document.getElementById('display-screen');

            screen.classList.add('gold-border-active');
            nameEl.classList.remove('text-red-950');
            nameEl.classList.add('text-amber-100');
            statusEl.innerText = '🧧 正在讀取鴻運數據 // 分析福氣... 🧧';

            let speed = 50; let elapsed = 0; const duration = 3000;
            const tick = () => {
                nameEl.innerText = names[Math.floor(Math.random() * names.length)];
                SoundManager.playTick();
                elapsed += speed;
                if (elapsed > duration * 0.7) speed += 30;
                if (elapsed < duration) { setTimeout(tick, speed); } else { finalizeDraw(targetName, targetPrize); }
            };
            tick();
        }

        function finalizeDraw(wName, wPrize) {
            isDrawing = false; particles.forEach(p => p.reset());
            document.getElementById('current-name').innerText = wName;
            document.getElementById('system-status').innerText = '🧧 賀！中獎者揭曉 🧧';
            document.getElementById('display-screen').classList.remove('gold-border-active');

            document.getElementById('winner-name').innerText = wName;
            document.getElementById('winner-prize').innerText = wPrize;
            const modal = document.getElementById('winner-modal');
            const content = document.getElementById('winner-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('scale-90', 'opacity-0'), 10);

            SoundManager.playWin();
            // 金紅配色彩帶
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors: ['#fbbf24', '#ef4444', '#ffffff', '#dc2626'] });

            names = names.filter(n => n !== wName);
            const pIdx = prizes.indexOf(wPrize); if (pIdx > -1) prizes.splice(pIdx, 1);
            history.unshift({ name: wName, prize: wPrize, time: new Date().toLocaleTimeString() });
            localStorage.setItem('lottery_names', JSON.stringify(names));
            localStorage.setItem('lottery_prizes', JSON.stringify(prizes));
            localStorage.setItem('lottery_history', JSON.stringify(history));
            renderLivePools();
        }

        function closeModal() {
            const modal = document.getElementById('winner-modal');
            const content = document.getElementById('winner-modal-content');
            content.classList.add('scale-90', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (history.length === 0) {
                list.innerHTML = `<div class="text-center py-20 border border-dashed border-amber-500/10 rounded-3xl text-red-900 font-bold uppercase tracking-widest text-xs">尚無中獎紀錄</div>`;
                return;
            }
            list.innerHTML = history.map(item => `
                <div class="bg-red-900/20 p-4 rounded-xl border border-amber-500/10 flex items-center justify-between">
                    <div>
                        <div class="text-xl font-black text-amber-100">${item.name}</div>
                        <div class="text-[9px] text-red-300/50 font-bold tracking-widest">${item.time}</div>
                    </div>
                    <div class="bg-amber-500/10 text-amber-400 px-4 py-1.5 rounded-lg font-bold border border-amber-500/20 text-sm italic">
                        <i data-lucide="party-popper" size="12" class="inline mb-1 mr-1"></i> ${item.prize}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function clearHistory() {
            if (confirm('確定清空中獎榜單嗎？')) {
                history = []; localStorage.setItem('lottery_history', JSON.stringify(history)); renderHistory();
            }
        }

        window.onload = () => {
            lucide.createIcons(); window.addEventListener('resize', resize);
            resize(); initParticles(); animate(); renderLivePools(); switchTab('draw');
        };
    </script>
</body>
</html>
