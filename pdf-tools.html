<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 萬能編輯工具 - 專業增強版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF-Lib -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- JSZip for PNG Packaging -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .page-card:hover .card-actions { opacity: 1; }
        .sortable-ghost { opacity: 0.3; background: #ebf8ff; border: 2px dashed #4299e1; }
        #drop-zone.dragover { border-color: #3b82f6; background-color: #f8fafc; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; flex-direction: column; color: white; }
        .advanced-settings { display: none; }
        .advanced-settings.active { display: block; }
        .page-card.is-selected { border: 2px solid #3b82f6; background-color: #eff6ff; }
        .page-card.is-selected .select-checkbox { background-color: #3b82f6; border-color: #3b82f6; }
        
        #drop-indicator { display: none; position: absolute; width: 4px; background-color: #3b82f6; border-radius: 2px; z-index: 30; pointer-events: none; transition: all 0.1s ease; }
        #custom-confirm, #crop-modal, #range-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        
        #crop-container { position: relative; max-width: 80vw; max-height: 70vh; overflow: auto; background: #333; }
        #crop-overlay { position: absolute; border: 2px dashed #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); cursor: move; }
        .crop-handle { position: absolute; width: 12px; height: 12px; background: #3b82f6; border: 1px solid white; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-24">

    <!-- 全局讀取遮罩 -->
    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white mb-4"></div>
        <p class="text-lg font-semibold" id="loading-text">處理中...</p>
    </div>

    <!-- 頁數選取匯入視窗 -->
    <div id="range-modal">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold mb-2 flex items-center gap-2 text-blue-600">
                <i data-lucide="file-digit"></i> 匯入設定
            </h3>
            <p class="text-gray-600 mb-4 text-sm" id="range-file-info">正在匯入檔案...</p>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">請輸入要匯入的頁碼：</label>
                <input type="text" id="import-range-input" class="w-full border-gray-300 rounded-lg shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500" placeholder="例如: 1, 3-5, 10">
                <p class="text-[11px] text-gray-400 mt-1">留空則匯入所有頁面。範圍請使用「-」，多個頁碼請使用「,」分隔。</p>
            </div>
            <div class="flex justify-end gap-3">
                <button id="range-cancel" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg">取消</button>
                <button id="range-submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">確認匯入</button>
            </div>
        </div>
    </div>

    <!-- 裁切視窗 -->
    <div id="crop-modal">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-4xl w-full mx-4 flex flex-col">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="crop"></i> 裁切頁面</h3>
            <div id="crop-container" class="rounded border border-gray-200 self-center">
                <canvas id="crop-canvas"></canvas>
                <div id="crop-overlay">
                    <div class="crop-handle -top-1.5 -left-1.5 cursor-nw-resize" data-handle="nw"></div>
                    <div class="crop-handle -top-1.5 -right-1.5 cursor-ne-resize" data-handle="ne"></div>
                    <div class="crop-handle -bottom-1.5 -left-1.5 cursor-sw-resize" data-handle="sw"></div>
                    <div class="crop-handle -bottom-1.5 -right-1.5 cursor-se-resize" data-handle="se"></div>
                </div>
            </div>
            <div class="mt-6 flex justify-between items-center">
                <p class="text-sm text-gray-500">拖動邊角調整區域，拖動中心移動位置</p>
                <div class="flex gap-3">
                    <button id="crop-cancel" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg">取消</button>
                    <button id="crop-apply" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">套用裁切</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 確認對話框 -->
    <div id="custom-confirm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4">
            <h3 class="text-xl font-bold text-gray-800 mb-2" id="confirm-title">確認操作</h3>
            <p class="text-gray-600 mb-6" id="confirm-msg">您確定要執行此操作嗎？</p>
            <div class="flex justify-end gap-3">
                <button id="confirm-cancel" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg">取消</button>
                <button id="confirm-ok" class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 font-semibold">確定執行</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center justify-center gap-2">
                <i data-lucide="file-text" class="text-blue-600"></i> PDF 萬能編輯工具 Pro
            </h1>
            <p class="text-gray-600 mt-2">點擊方框選取頁面。匯入 PDF 時可自訂匯入範圍。</p>
        </header>

        <!-- 工具欄 -->
        <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100 relative z-10">
            <div class="flex flex-wrap gap-4 items-center justify-between mb-4">
                <div class="flex flex-wrap gap-2">
                    <label class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg cursor-pointer flex items-center gap-2 transition-colors shadow-sm">
                        <i data-lucide="file-up" size="20"></i> 新增檔案 (PDF/圖片)
                        <input type="file" id="file-input" class="hidden" multiple accept="application/pdf,image/*">
                    </label>
                    <button id="select-all" class="text-gray-600 hover:bg-gray-100 px-4 py-2 rounded-lg border border-gray-200 flex items-center gap-2">
                        <i data-lucide="check-square" size="20"></i> 全選
                    </button>
                    <button id="clear-all-btn" class="text-gray-600 hover:bg-gray-100 px-4 py-2 rounded-lg border border-gray-200 flex items-center gap-2">
                        <i data-lucide="trash-2" size="20"></i> 清除全部
                    </button>
                </div>

                <div class="flex items-center gap-3">
                    <button id="toggle-advanced" class="text-blue-600 hover:bg-blue-50 px-3 py-2 rounded-lg flex items-center gap-1 transition-colors">
                        <i data-lucide="settings-2" size="18"></i> 頁碼進階設定
                    </button>
                    <button id="export-pdf" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg shadow-md transition-all flex items-center gap-2 font-semibold">
                        <i data-lucide="file-type-2" size="20"></i> 下載合併 PDF
                    </button>
                </div>
            </div>

            <!-- 進階設定區域 -->
            <div id="advanced-panel" class="advanced-settings bg-blue-50 p-4 rounded-lg border border-blue-100">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">啟用頁碼</label>
                        <select id="pn-enabled" class="w-full border-gray-300 rounded-md shadow-sm py-2 px-2">
                            <option value="no">不加上頁碼</option>
                            <option value="yes">加上頁碼</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">起始頁面</label>
                        <input type="number" id="pn-start-page" value="1" min="1" class="w-full border-gray-300 rounded-md shadow-sm py-2 px-3">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">起始數字</label>
                        <input type="number" id="pn-start-value" value="1" min="0" class="w-full border-gray-300 rounded-md shadow-sm py-2 px-3">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">頁碼位置</label>
                        <select id="pn-position" class="w-full border-gray-300 rounded-md shadow-sm py-2 px-2">
                            <option value="center">正下方</option>
                            <option value="left">左下方</option>
                            <option value="right">右下方</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- 顯示區 -->
        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-2xl min-h-[400px] p-6 bg-white transition-all relative">
            <div id="drop-indicator"></div>
            <div id="empty-state" class="flex flex-col items-center justify-center h-full py-20 text-gray-400">
                <i data-lucide="upload-cloud" size="64" class="mb-4"></i>
                <p class="text-xl text-center text-gray-500 font-medium">拖放 PDF 或 圖片 到這裡</p>
                <p class="text-sm mt-2 text-gray-400">點擊分頁左上角勾選，支援 Shift 連續選取</p>
            </div>
            <div id="pages-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 relative"></div>
        </div>
    </div>

    <!-- 批次操作浮動列 -->
    <div id="batch-toolbar" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-6 transition-all transform translate-y-32 opacity-0 z-40">
        <div class="flex flex-col">
            <span class="text-xs text-gray-400">已選取</span>
            <span class="font-bold text-lg leading-none" id="selected-count">0 頁</span>
        </div>
        <div class="h-8 w-px bg-gray-700"></div>
        <div class="flex gap-2">
            <button id="batch-delete" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg flex items-center gap-2"><i data-lucide="trash" size="18"></i> 刪除</button>
            <button id="batch-png" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-lg flex items-center gap-2"><i data-lucide="image" size="18"></i> 轉為 PNG 打包</button>
            <button id="batch-export" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg flex items-center gap-2"><i data-lucide="file-output" size="18"></i> 僅匯出選取</button>
            <button id="deselect-all" class="text-gray-300 hover:text-white px-4 py-2">取消</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg opacity-0 transition-opacity pointer-events-none z-50">已成功更新</div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const pagesContainer = document.getElementById('pages-container');
        const emptyState = document.getElementById('empty-state');
        const dropIndicator = document.getElementById('drop-indicator');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const batchToolbar = document.getElementById('batch-toolbar');
        const selectedCountLabel = document.getElementById('selected-count');
        const advancedPanel = document.getElementById('advanced-panel');
        const toggleAdvanced = document.getElementById('toggle-advanced');

        // 裁切相關
        const cropModal = document.getElementById('crop-modal');
        const cropCanvas = document.getElementById('crop-canvas');
        const cropOverlay = document.getElementById('crop-overlay');
        const ctxCrop = cropCanvas.getContext('2d');

        // 範圍選取相關
        const rangeModal = document.getElementById('range-modal');
        const rangeInput = document.getElementById('import-range-input');
        const rangeFileInfo = document.getElementById('range-file-info');
        const rangeSubmit = document.getElementById('range-submit');
        const rangeCancel = document.getElementById('range-cancel');

        let pageList = []; 
        let selectedIds = new Set();
        let lastSelectedIndex = null;
        let calculatedInsertIndex = null;
        let activeCropId = null;

        lucide.createIcons();

        // 頁碼面板切換
        toggleAdvanced.addEventListener('click', () => {
            advancedPanel.classList.toggle('active');
        });

        // --- 核心邏輯：頁碼範圍解析 ---

        function parseRange(rangeStr, maxPages) {
            const pages = new Set();
            if (!rangeStr || rangeStr.trim() === '') {
                return [...Array(maxPages).keys()];
            }
            const parts = rangeStr.split(/[,，]/);
            parts.forEach(part => {
                const range = part.trim().split('-');
                if (range.length === 1) {
                    const p = parseInt(range[0]);
                    if (!isNaN(p) && p >= 1 && p <= maxPages) pages.add(p - 1);
                } else if (range.length === 2) {
                    const start = parseInt(range[0]);
                    const end = parseInt(range[1]);
                    if (!isNaN(start) && !isNaN(end)) {
                        const low = Math.min(start, end);
                        const high = Math.max(start, end);
                        for (let i = low; i <= high; i++) {
                            if (i >= 1 && i <= maxPages) pages.add(i - 1);
                        }
                    }
                }
            });
            return pages.size > 0 ? Array.from(pages).sort((a, b) => a - b) : [...Array(maxPages).keys()];
        }

        // --- 核心邏輯：檔案處理 ---

        fileInput.addEventListener('change', (e) => handleFilesWithConfig(e.target.files));

        async function handleFilesWithConfig(files, insertIndex = null) {
            const validFiles = Array.from(files);
            if (validFiles.length === 0) return;

            for (const file of validFiles) {
                if (file.type === 'application/pdf') {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDocLib = await PDFLib.PDFDocument.load(arrayBuffer.slice(0));
                    const pageCount = pdfDocLib.getPageCount();

                    // 顯示頁數選取視窗
                    rangeFileInfo.innerHTML = `檔案：<strong>${file.name}</strong><br>總共頁數：${pageCount} 頁`;
                    rangeInput.value = "";
                    rangeModal.style.display = 'flex';

                    const userChoice = await new Promise(resolve => {
                        const handleOk = () => {
                            const indices = parseRange(rangeInput.value, pageCount);
                            rangeSubmit.removeEventListener('click', handleOk);
                            rangeCancel.removeEventListener('click', handleCancel);
                            rangeModal.style.display = 'none';
                            resolve(indices);
                        };
                        const handleCancel = () => {
                            rangeSubmit.removeEventListener('click', handleOk);
                            rangeCancel.removeEventListener('click', handleCancel);
                            rangeModal.style.display = 'none';
                            resolve(null);
                        };
                        rangeSubmit.addEventListener('click', handleOk);
                        rangeCancel.addEventListener('click', handleCancel);
                    });

                    if (userChoice !== null) {
                        await processSingleFile(file, arrayBuffer, insertIndex, userChoice);
                    }
                } else if (file.type.startsWith('image/')) {
                    const arrayBuffer = await file.arrayBuffer();
                    await processSingleFile(file, arrayBuffer, insertIndex);
                }
            }
            fileInput.value = ""; // 清空 input 以便下次選擇同檔案
        }

        async function processSingleFile(file, arrayBuffer, insertIndex, indices = null) {
            showLoading(`正在匯入 ${file.name}...`);
            let tempNewPages = [];

            try {
                if (file.type === 'application/pdf') {
                    const pdfJsDoc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
                    const pdfDocLib = await PDFLib.PDFDocument.load(arrayBuffer.slice(0));
                    
                    const pagesToImport = indices || [...Array(pdfDocLib.getPageCount()).keys()];

                    for (const i of pagesToImport) {
                        const page = await pdfJsDoc.getPage(i + 1);
                        const thumbnail = await renderThumbnailFromSource(page, 0, null);
                        tempNewPages.push({
                            id: Math.random().toString(36).substr(2, 9),
                            type: 'pdf',
                            sourcePdf: arrayBuffer,
                            pageIndex: i,
                            thumbnail: thumbnail,
                            fileName: file.name,
                            rotation: 0,
                            crop: null
                        });
                    }
                } else {
                    const thumbnail = await readImageAsDataURL(file);
                    tempNewPages.push({
                        id: Math.random().toString(36).substr(2, 9),
                        type: 'image',
                        sourceImage: arrayBuffer,
                        thumbnail: thumbnail,
                        fileName: file.name,
                        rotation: 0,
                        crop: null
                    });
                }
            } catch (err) {
                console.error("處理出錯:", err);
            }

            if (insertIndex !== null) {
                pageList.splice(insertIndex, 0, ...tempNewPages);
            } else {
                pageList = pageList.concat(tempNewPages);
            }

            renderAllPages();
            updateEmptyState();
            hideLoading();
            showToast(`成功匯入 ${tempNewPages.length} 頁`);
        }

        async function renderThumbnailFromSource(pdfJsPage, rotation, crop) {
            const scale = 0.5;
            const viewport = pdfJsPage.getViewport({ scale, rotation });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            if (!crop) {
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await pdfJsPage.render({ canvasContext: ctx, viewport }).promise;
            } else {
                const fullW = viewport.width, fullH = viewport.height;
                const cw = (crop.w / 100) * fullW, ch = (crop.h / 100) * fullH;
                const cx = (crop.x / 100) * fullW, cy = (crop.y / 100) * fullH;
                canvas.width = cw; canvas.height = ch;
                const offscreen = document.createElement('canvas');
                offscreen.width = fullW; offscreen.height = fullH;
                const offCtx = offscreen.getContext('2d');
                await pdfJsPage.render({ canvasContext: offCtx, viewport }).promise;
                ctx.drawImage(offscreen, cx, cy, cw, ch, 0, 0, cw, ch);
            }
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        async function renderImageThumbnail(arrayBuffer, rotation, crop) {
            const blob = new Blob([arrayBuffer]);
            const url = URL.createObjectURL(blob);
            const img = new Image();
            await new Promise(resolve => { img.onload = resolve; img.src = url; });

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let w = img.width, h = img.height;
            if (rotation === 90 || rotation === 270) [w, h] = [h, w];

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w; tempCanvas.height = h;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.translate(w/2, h/2);
            tCtx.rotate(rotation * Math.PI / 180);
            tCtx.drawImage(img, -img.width/2, -img.height/2);

            if (!crop) {
                canvas.width = w; canvas.height = h;
                ctx.drawImage(tempCanvas, 0, 0);
            } else {
                const cw = (crop.w / 100) * w, ch = (crop.h / 100) * h;
                const cx = (crop.x / 100) * w, cy = (crop.y / 100) * h;
                canvas.width = cw; canvas.height = ch;
                ctx.drawImage(tempCanvas, cx, cy, cw, ch, 0, 0, cw, ch);
            }
            URL.revokeObjectURL(url);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        function readImageAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        // --- UI 渲染與互動 ---

        function renderAllPages() {
            pagesContainer.innerHTML = '';
            pageList.forEach((item, idx) => {
                const isSelected = selectedIds.has(item.id);
                const card = document.createElement('div');
                card.className = `page-card relative group bg-white p-2 border border-gray-200 rounded-lg shadow-sm cursor-pointer transition-all hover:scale-105 ${isSelected ? 'is-selected' : ''}`;
                card.dataset.id = item.id;
                
                card.innerHTML = `
                    <div class="absolute top-2 left-2 z-20">
                        <div class="select-checkbox w-6 h-6 border-2 border-gray-300 rounded bg-white flex items-center justify-center transition-all shadow-sm">
                            <i data-lucide="check" size="16" class="text-white ${isSelected ? '' : 'hidden'}"></i>
                        </div>
                    </div>
                    <div class="card-actions absolute top-2 right-2 flex gap-1 opacity-0 transition-opacity z-20">
                        <button class="rotate-btn p-1.5 bg-white/90 hover:bg-white text-blue-600 rounded-full shadow-sm border border-gray-100" title="旋轉">
                            <i data-lucide="rotate-cw" size="14"></i>
                        </button>
                        <button class="crop-btn p-1.5 bg-white/90 hover:bg-white text-green-600 rounded-full shadow-sm border border-gray-100" title="裁切">
                            <i data-lucide="crop" size="14"></i>
                        </button>
                        <button class="delete-btn p-1.5 bg-white/90 hover:bg-red-500 hover:text-white text-red-500 rounded-full shadow-sm border border-gray-100" title="刪除">
                            <i data-lucide="trash-2" size="14"></i>
                        </button>
                    </div>
                    <div class="aspect-[3/4] bg-gray-100 rounded overflow-hidden mb-2 pointer-events-none flex items-center justify-center">
                        <img src="${item.thumbnail}" class="w-full h-full object-contain" />
                    </div>
                    <div class="text-[10px] text-gray-500 truncate text-center pointer-events-none px-4 flex items-center justify-center gap-1">
                        ${item.type === 'image' ? '<i data-lucide="image" size="10"></i>' : ''} ${item.fileName}
                    </div>
                    <div class="absolute bottom-1 right-2 bg-blue-600 text-white text-[10px] px-1.5 rounded-full font-bold page-number-badge">
                        ${idx + 1}
                    </div>
                `;

                // 修復：優化點擊邏輯，直接抓取點擊
                card.onclick = (e) => {
                    if (e.target.closest('button')) return;
                    toggleSelect(item.id, idx, e.shiftKey);
                };

                card.querySelector('.rotate-btn').onclick = () => rotatePage(item.id);
                card.querySelector('.crop-btn').onclick = () => openCropModal(item.id);
                card.querySelector('.delete-btn').onclick = () => removePage(item.id);

                pagesContainer.appendChild(card);
            });
            lucide.createIcons();
            updateBatchToolbar();
        }

        async function updateItemThumbnail(id) {
            const item = pageList.find(p => p.id === id);
            if (!item) return;

            if (item.type === 'pdf') {
                const pdfJsDoc = await pdfjsLib.getDocument({ data: item.sourcePdf.slice(0) }).promise;
                const page = await pdfJsDoc.getPage(item.pageIndex + 1);
                item.thumbnail = await renderThumbnailFromSource(page, item.rotation, item.crop);
            } else {
                item.thumbnail = await renderImageThumbnail(item.sourceImage, item.rotation, item.crop);
            }
            renderAllPages();
        }

        function rotatePage(id) {
            const item = pageList.find(p => p.id === id);
            item.rotation = (item.rotation + 90) % 360;
            updateItemThumbnail(id);
        }

        function removePage(id) {
            pageList = pageList.filter(p => p.id !== id);
            selectedIds.delete(id);
            renderAllPages();
            updateEmptyState();
        }

        function toggleSelect(id, index, isShift) {
            if (isShift && lastSelectedIndex !== null) {
                const start = Math.min(lastSelectedIndex, index);
                const end = Math.max(lastSelectedIndex, index);
                for (let i = start; i <= end; i++) selectedIds.add(pageList[i].id);
            } else {
                if (selectedIds.has(id)) selectedIds.delete(id);
                else selectedIds.add(id);
                lastSelectedIndex = index;
            }
            renderAllPages();
        }

        function updateBatchToolbar() {
            selectedCountLabel.textContent = `${selectedIds.size} 頁`;
            if (selectedIds.size > 0) batchToolbar.classList.remove('translate-y-32', 'opacity-0');
            else batchToolbar.classList.add('translate-y-32', 'opacity-0');
        }

        // --- 裁切功能邏輯 ---

        let cropState = { x: 10, y: 10, w: 80, h: 80 };

        async function openCropModal(id) {
            activeCropId = id;
            const item = pageList.find(p => p.id === id);
            showLoading("準備預覽...");

            let previewUrl;
            if (item.type === 'pdf') {
                const doc = await pdfjsLib.getDocument({ data: item.sourcePdf.slice(0) }).promise;
                const page = await doc.getPage(item.pageIndex + 1);
                previewUrl = await renderThumbnailFromSource(page, item.rotation, null);
            } else {
                previewUrl = await renderImageThumbnail(item.sourceImage, item.rotation, null);
            }

            const img = new Image();
            img.onload = () => {
                const maxDim = 600;
                let w = img.width, h = img.height;
                if (w > h) { if (w > maxDim) { h *= maxDim / w; w = maxDim; } }
                else { if (h > maxDim) { w *= maxDim / h; h = maxDim; } }

                cropCanvas.width = w; cropCanvas.height = h;
                ctxCrop.drawImage(img, 0, 0, w, h);
                cropState = item.crop ? { ...item.crop } : { x: 10, y: 10, w: 80, h: 80 };
                updateCropOverlay();
                cropModal.style.display = 'flex';
                hideLoading();
            };
            img.src = previewUrl;
        }

        function updateCropOverlay() {
            cropOverlay.style.left = `${cropState.x}%`;
            cropOverlay.style.top = `${cropState.y}%`;
            cropOverlay.style.width = `${cropState.w}%`;
            cropOverlay.style.height = `${cropState.h}%`;
        }

        let isDragging = false, dragType = '', startX, startY, startCrop;

        cropOverlay.onmousedown = (e) => {
            isDragging = true; startX = e.clientX; startY = e.clientY; startCrop = { ...cropState };
            dragType = e.target.dataset.handle || 'move';
            e.stopPropagation();
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            const dx = (e.clientX - startX) / cropCanvas.width * 100;
            const dy = (e.clientY - startY) / cropCanvas.height * 100;

            if (dragType === 'move') {
                cropState.x = Math.max(0, Math.min(100 - cropState.w, startCrop.x + dx));
                cropState.y = Math.max(0, Math.min(100 - cropState.h, startCrop.y + dy));
            } else if (dragType === 'se') {
                cropState.w = Math.max(5, Math.min(100 - cropState.x, startCrop.w + dx));
                cropState.h = Math.max(5, Math.min(100 - cropState.y, startCrop.h + dy));
            } else if (dragType === 'nw') {
                const newX = Math.max(0, Math.min(startCrop.x + startCrop.w - 5, startCrop.x + dx));
                cropState.w = startCrop.w - (newX - startCrop.x); cropState.x = newX;
                const newY = Math.max(0, Math.min(startCrop.y + startCrop.h - 5, startCrop.y + dy));
                cropState.h = startCrop.h - (newY - startCrop.y); cropState.y = newY;
            }
            updateCropOverlay();
        };

        window.onmouseup = () => isDragging = false;

        document.getElementById('crop-apply').onclick = async () => {
            showLoading("更新縮圖...");
            const item = pageList.find(p => p.id === activeCropId);
            item.crop = { ...cropState };
            cropModal.style.display = 'none';
            await updateItemThumbnail(activeCropId);
            hideLoading();
            showToast("裁切已套用");
        };

        document.getElementById('crop-cancel').onclick = () => cropModal.style.display = 'none';

        // --- 匯出功能 ---

        document.getElementById('batch-png').onclick = async () => {
            const selectedItems = pageList.filter(p => selectedIds.has(p.id));
            if (selectedItems.length === 0) return;

            showLoading("正在打包 PNG...");
            const zip = new JSZip();

            for (let i = 0; i < selectedItems.length; i++) {
                const item = selectedItems[i];
                const canvas = document.createElement('canvas');
                if (item.type === 'pdf') {
                    const doc = await pdfjsLib.getDocument({ data: item.sourcePdf.slice(0) }).promise;
                    const page = await doc.getPage(item.pageIndex + 1);
                    const v = page.getViewport({ scale: 2, rotation: item.rotation });
                    if (!item.crop) {
                        canvas.width = v.width; canvas.height = v.height;
                        await page.render({ canvasContext: canvas.getContext('2d'), viewport: v }).promise;
                    } else {
                        const fullW = v.width, fullH = v.height;
                        const cw = (item.crop.w/100)*fullW, ch = (item.crop.h/100)*fullH;
                        const cx = (item.crop.x/100)*fullW, cy = (item.crop.y/100)*fullH;
                        canvas.width = cw; canvas.height = ch;
                        const temp = document.createElement('canvas');
                        temp.width = fullW; temp.height = fullH;
                        await page.render({ canvasContext: temp.getContext('2d'), viewport: v }).promise;
                        canvas.getContext('2d').drawImage(temp, cx, cy, cw, ch, 0, 0, cw, ch);
                    }
                } else {
                    const imgDataUrl = await renderImageThumbnail(item.sourceImage, item.rotation, item.crop);
                    const img = new Image();
                    await new Promise(r => { img.onload = r; img.src = imgDataUrl; });
                    canvas.width = img.width; canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                }
                zip.file(`page_${i + 1}.png`, canvas.toDataURL('image/png').split(',')[1], { base64: true });
            }

            const content = await zip.generateAsync({ type: "blob" });
            downloadBlob(content, "exported_images.zip", "application/zip");
            hideLoading();
        };

        async function exportPdfAction(listToExport) {
            if (listToExport.length === 0) return;
            showLoading("產出 PDF 中...");

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                const pnEnabled = document.getElementById('pn-enabled').value === 'yes';
                const startFromPage = parseInt(document.getElementById('pn-start-page').value) || 1;
                const startValue = parseInt(document.getElementById('pn-start-value').value) || 1;
                const position = document.getElementById('pn-position').value;

                for (let i = 0; i < listToExport.length; i++) {
                    const item = listToExport[i];
                    let pdfPage;

                    if (item.type === 'pdf') {
                        const sourceDoc = await PDFLib.PDFDocument.load(item.sourcePdf.slice(0));
                        const [copied] = await mergedPdf.copyPages(sourceDoc, [item.pageIndex]);
                        pdfPage = mergedPdf.addPage(copied);
                    } else {
                        const img = await mergedPdf.embedJpg(item.sourceImage);
                        pdfPage = mergedPdf.addPage([img.width, img.height]);
                        pdfPage.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                    }

                    if (item.rotation !== 0) {
                        pdfPage.setRotation(PDFLib.degrees(pdfPage.getRotation().angle + item.rotation));
                    }

                    if (item.crop) {
                        const { width, height } = pdfPage.getSize();
                        const cx = (item.crop.x / 100) * width;
                        const cy = (item.crop.y / 100) * height;
                        const cw = (item.crop.w / 100) * width;
                        const ch = (item.crop.h / 100) * height;
                        pdfPage.setCropBox(cx, height - cy - ch, cw, ch);
                    }

                    if (pnEnabled && (i + 1) >= startFromPage) {
                        const { width, height } = pdfPage.getSize();
                        const displayNum = startValue + (i + 1 - startFromPage);
                        let x = width / 2;
                        if (position === 'left') x = 40; else if (position === 'right') x = width - 60;
                        pdfPage.drawText(displayNum.toString(), { x, y: 20, size: 12 });
                    }
                }

                const pdfBytes = await mergedPdf.save();
                downloadBlob(pdfBytes, 'final_document.pdf', 'application/pdf');
                showToast("匯出完成");
            } catch (err) {
                console.error(err);
                alert("匯出錯誤");
            } finally {
                hideLoading();
            }
        }

        // --- 輔助功能 ---

        function updateEmptyState() {
            if (pageList.length > 0) emptyState.classList.add('hidden');
            else emptyState.classList.remove('hidden');
        }

        function downloadBlob(data, fileName, mimeType) {
            const blob = new Blob([data], { type: mimeType });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName; a.click();
            window.URL.revokeObjectURL(url);
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loading.style.display = 'flex';
        }

        function hideLoading() { loading.style.display = 'none'; }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg; toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        // 確認按鈕
        document.getElementById('select-all').onclick = () => {
            pageList.forEach(p => selectedIds.add(p.id));
            renderAllPages();
        };

        document.getElementById('clear-all-btn').onclick = () => {
            if (pageList.length === 0) return;
            const confirmBox = document.getElementById('custom-confirm');
            confirmBox.style.display = 'flex';
            document.getElementById('confirm-ok').onclick = () => {
                pageList = []; selectedIds.clear();
                renderAllPages(); updateEmptyState();
                confirmBox.style.display = 'none';
            };
            document.getElementById('confirm-cancel').onclick = () => confirmBox.style.display = 'none';
        };

        document.getElementById('export-pdf').onclick = () => exportPdfAction(pageList);
        document.getElementById('batch-export').onclick = () => exportPdfAction(pageList.filter(p => selectedIds.has(p.id)));
        document.getElementById('batch-delete').onclick = () => {
            pageList = pageList.filter(p => !selectedIds.has(p.id));
            selectedIds.clear(); renderAllPages(); updateEmptyState();
        };

        // 智慧指示線
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (pageList.length === 0) return;
            const mouseX = e.clientX, mouseY = e.clientY;
            const cards = Array.from(document.querySelectorAll('.page-card'));
            let closest = null, offset = Number.POSITIVE_INFINITY, isAfter = false;

            cards.forEach((card, index) => {
                const box = card.getBoundingClientRect();
                const centerX = box.left + box.width / 2, centerY = box.top + box.height / 2;
                const distance = Math.hypot(mouseX - centerX, mouseY - centerY);
                if (distance < offset) { offset = distance; closest = card; calculatedInsertIndex = index; isAfter = mouseX > centerX; }
            });

            if (closest) {
                const box = closest.getBoundingClientRect(), containerBox = dropZone.getBoundingClientRect();
                dropIndicator.style.display = 'block';
                dropIndicator.style.height = `${box.height}px`;
                dropIndicator.style.top = `${box.top - containerBox.top}px`;
                if (isAfter) { dropIndicator.style.left = `${box.right - containerBox.left + 8}px`; calculatedInsertIndex += 1; }
                else { dropIndicator.style.left = `${box.left - containerBox.left - 12}px`; }
            }
        });
        dropZone.addEventListener('dragleave', (e) => { if (!dropZone.contains(e.relatedTarget)) dropIndicator.style.display = 'none'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropIndicator.style.display = 'none';
            handleFilesWithConfig(e.dataTransfer.files, calculatedInsertIndex);
            calculatedInsertIndex = null;
        });

        // 初始化
        updateEmptyState();

    </script>
</body>
</html>
