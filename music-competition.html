<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂比賽控場系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #8b5cf6;
            --accent: #f43f5e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .grid-container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        .column {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            user-select: none;
        }

        .column-title {
            font-weight: bold;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-list {
            padding: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .player-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-num {
            background: var(--primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-group {
            display: flex;
            gap: 5px;
        }

        .btn-action {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-next {
            background: var(--primary);
        }

        .btn-prev {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .alert-bar {
            background: #450a0a;
            border: 1px solid #991b1b;
            color: #fecaca;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status-online {
            background: #10b981;
        }

        .status-offline {
            background: #f43f5e;
        }

        .status-loading {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--primary);
        }

        /* 待命區大按鈕樣式 */
        .btn-waitlist {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--primary);
            color: white;
            border-radius: 8px;
            padding: 0;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-waitlist:active {
            filter: brightness(1.5);
            transform: scale(0.9);
        }

        .waitlist-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .collapsed .chevron {
            transform: rotate(-90deg);
        }

        .collapsed .player-list {
            display: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div>
                    <h1 style="margin:0; font-size: 1.2rem;">音樂比賽控場系統</h1>
                    <div
                        style="font-size: 0.75rem; color: var(--primary); font-weight: bold; background: rgba(139, 92, 246, 0.1); padding: 1px 6px; border-radius: 4px; display: inline-block;">
                        📅 {{ currentDate }}
                    </div>
                </div>
                <div style="display: flex; align-items:center; font-size: 0.75rem; color: rgba(255,255,255,0.4)">
                    <span
                        :class="['status-dot', isOnline ? 'status-online' : 'status-offline', loading ? 'status-loading' : '']"></span>
                </div>
            </div>
            <button @click="showResetModal = true"
                style="background:var(--accent); border:none; color:white; padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; cursor:pointer;">重設</button>
        </header>

        <div v-if="smartAlerts.length > 0" class="alert-bar">
            <div v-for="(alert, index) in smartAlerts" :key="index" style="margin-bottom:4px;">⚠️ {{ alert }}</div>
        </div>

        <main class="grid-container">
            <!-- 每一區套用摺疊 -->
            <div v-for="zone in zones" :key="zone.id" class="column" :class="{ collapsed: isCollapsed(zone.id) }">
                <div class="column-header" @click="toggleCollapse(zone.id)">
                    <span class="column-title">
                        <i data-lucide="chevron-down" class="chevron" style="width:16px;"></i>
                        {{ zone.title }}
                    </span>
                    <span class="badge">{{ playersIn(zone.id).length }}{{ zone.max ? ' / ' + zone.max : '' }}</span>
                </div>

                <div class="player-list">
                    <!-- 針對「未報到」特殊處理 -->
                    <div v-if="zone.id === '1F 報到'"
                        style="margin-bottom:15px; background:rgba(255,255,255,0.02); padding:12px; border-radius:10px; border: 1px solid rgba(139, 92, 246, 0.2);">
                        <strong style="font-size:0.85rem; color:var(--primary); display:block; margin-bottom:10px;">快速報到 (點擊直達 5F):</strong>
                        <div class="waitlist-container">
                            <button v-for="p in playersIn('未報到')" :key="p['選手編號']" @click="move(p, '5F 休息區')"
                                class="btn-waitlist">
                                {{ p['選手編號'] }}
                            </button>
                        </div>
                    </div>

                    <div v-for="p in playersIn(zone.id)" :key="p['選手編號']" class="player-card">
                        <div class="player-info">
                            <div class="player-num">{{ p['選手編號'] }}</div>
                        </div>
                        <div class="btn-group">
                            <button v-if="zone.prev" class="btn-action btn-prev" @click="move(p, zone.prev)">
                                <i data-lucide="arrow-left" style="width:12px;"></i>回
                            </button>
                            <button v-if="zone.next" class="btn-action btn-next" @click="move(p, zone.next)">
                                {{ zone.nextShort }}<i data-lucide="arrow-right" style="width:12px;"></i>
                            </button>
                        </div>
                    </div>
                    <div v-if="!playersIn(zone.id).length"
                        style="color:rgba(255,255,255,0.1); text-align:center; font-size:0.8rem; padding:10px;">(空)
                    </div>
                </div>
            </div>
        </main>

        <div v-if="showResetModal" class="modal-overlay" @click.self="showResetModal = false">
            <div class="modal">
                <h3 style="margin-top:0">重設比賽</h3>
                <input type="date" v-model="resetDate"
                    style="width:100%; padding:10px; margin-bottom:10px; background:#111; color:white; border:1px solid #333;">
                <input type="number" v-model="resetCount"
                    style="width:100%; padding:10px; margin-bottom:20px; background:#111; color:white; border:1px solid #333;">
                <button @click="confirmInitialDay"
                    style="width:100%; background:var(--accent); color:white; padding:10px; border:none; border-radius:6px;">確認重建</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbz-ydM9scvTeNoOoTYfMVd_o1dteti91ja1z6Jh8kIsIOy6F9qBa2Ah_w2FOmjz02Xpsw/exec";

        createApp({
            setup() {
                const players = ref([]);
                const currentDate = ref("載入中...");
                const loading = ref(false);
                const showResetModal = ref(false);
                const isOnline = ref(true);
                const resetDate = ref(new Date().toISOString().split('T')[0]);
                const resetCount = ref(35);
                const collapsedStates = ref(JSON.parse(localStorage.getItem('accordion_states') || '{}'));

                const zones = [
                    { id: '1F 報到', title: '1F 報到區', next: '5F 休息區', nextShort: '至 5F 休息區' },
                    { id: '5F 休息區', title: '5F 休息區', prev: '1F 報到', next: '3F 預備 3', nextShort: '進 預備 3' },
                    { id: '3F 預備 3', title: '3F 預備 3', prev: '5F 休息區', next: '3F 預備 2', nextShort: '進 預備 2', max: 3 },
                    { id: '3F 預備 2', title: '3F 預備 2', prev: '3F 預備 3', next: '3F 預備 1', nextShort: '進 預備 1', max: 2 },
                    { id: '3F 預備 1', title: '3F 預備 1', prev: '3F 預備 2', next: '比賽中', nextShort: '前往舞台', max: 1 },
                    { id: '比賽中', title: '比賽中', prev: '3F 預備 1' },
                    { id: '已完賽', title: '已完賽區' }
                ];

                const toggleCollapse = (id) => {
                    collapsedStates.value[id] = !collapsedStates.value[id];
                    localStorage.setItem('accordion_states', JSON.stringify(collapsedStates.value));
                    setTimeout(() => lucide.createIcons(), 0);
                };
                const isCollapsed = (id) => !!collapsedStates.value[id];

                const fetchPlayers = async () => {
                    loading.value = true;
                    try {
                        const res = await fetch(`${DEFAULT_GAS_URL}?action=getData`);
                        const result = await res.json();
                        if (result && result.success) {
                            const first = result.data[0];
                            if (first) {
                                const k = Object.keys(first).find(x => x.includes("比賽日期"));
                                if (k) currentDate.value = k.split('：')[1] || k.split(':')[1] || k;
                            }
                            players.value = result.data.map(p => ({
                                '選手編號': p['選手編號'] || p['選手編號 '],
                                '目前位置': p['目前位置'] || p['目前位置 '],
                                '更新時間': p['更新時間'] || p['更新時間 '],
                                ...p
                            })).filter(p => p['選手編號']);
                            isOnline.value = true;
                        } else isOnline.value = false;
                    } catch (e) { isOnline.value = false; }
                    loading.value = false;
                };

                const move = async (player, toZone) => {
                    loading.value = true;
                    try {
                        // 特殊邏輯：如果要進入「比賽中」，先將原本在「比賽中」的人移到「已完賽」
                        if (toZone === '比賽中') {
                            const currentStagePlayers = playersIn('比賽中');
                            for (const p of currentStagePlayers) {
                                await fetch(DEFAULT_GAS_URL, {
                                    method: 'POST',
                                    body: JSON.stringify({ action: 'updateLocation', id: p['選手編號'], toZone: '已完賽' })
                                });
                            }
                        }

                        const res = await fetch(DEFAULT_GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'updateLocation', id: player['選手編號'], toZone })
                        });
                        const result = await res.json();
                        if (result.success) await fetchPlayers();
                        else alert(result.message);
                    } catch (e) { alert("移動失敗"); }
                    loading.value = false;
                };

                const confirmInitialDay = async () => {
                    if (!confirm("確定重建嗎？")) return;
                    loading.value = true;
                    try {
                        const res = await fetch(`${DEFAULT_GAS_URL}?action=initializeDay&date=${resetDate.value}&totalCount=${resetCount.value}`);
                        const result = await res.json();
                        alert(result.message);
                        showResetModal.value = false;
                        await fetchPlayers();
                    } catch (e) { alert("重建失敗"); }
                    loading.value = false;
                };

                const playersIn = (id) => players.value
                    .filter(p => p['目前位置'] === id)
                    .sort((a, b) => parseInt(a['選手編號']) - parseInt(b['選手編號']));

                const smartAlerts = computed(() => {
                    const m = [];
                    const p1 = playersIn('3F 預備 1');
                    const p2 = playersIn('3F 預備 2');
                    const p3 = playersIn('3F 預備 3');
                    const rest = playersIn('5F 休息區');

                    if (p1.length < 1) {
                        const needed = 1 - p1.length;
                        const nextOnes = p2.slice(0, needed).map(p => p['選手編號']).join(', ');
                        m.push(`【預備 1 缺人】請${nextOnes ? '將 ' + nextOnes + ' 號進預備 1' : '補位'}`);
                    }
                    if (p2.length < 2) {
                        const needed = 2 - p2.length;
                        const nextOnes = p3.slice(0, needed).map(p => p['選手編號']).join(', ');
                        m.push(`【預備 2 缺人】請${nextOnes ? '將 ' + nextOnes + ' 號進預備 2' : '補位'}`);
                    }
                    if (p3.length < 3) {
                        const needed = 3 - p3.length;
                        const nextOnes = rest.slice(0, needed).map(p => p['選手編號']).join(', ');
                        m.push(`【預備 3 缺人】請從 5F 叫 ${nextOnes ? nextOnes + ' 號進預備 3' : '下一波入座'}`);
                    }
                    return m;
                });

                onMounted(() => {
                    fetchPlayers();
                    setInterval(fetchPlayers, 10000);
                    setTimeout(() => lucide.createIcons(), 500);
                });

                return {
                    players, currentDate, loading, showResetModal, isOnline, resetDate, resetCount,
                    zones, toggleCollapse, isCollapsed, playersIn, move, confirmInitialDay, smartAlerts
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
